name: Update catalogus site

on:
  push:
    branches: [main]
    paths:
      - data/02-prepared/cbs_datasets_ai.json

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Kopieer data naar docs/
        run: cp data/02-prepared/cbs_datasets_ai.json docs/data.json

      - name: Commit docs/data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || (git commit -m "chore: update catalogus data" && git push)
